<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="АПБ Админ Панель – управление чемпионатом" />
  <link rel="manifest" href="/apb-admin/a-manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/apb-admin/aapple-touch-icon.png" />
  <title>АПБ Админ</title>
  
  <!-- Оптимизация: предзагрузка критических ресурсов -->
  <link rel="preconnect" href="https://cdn.tailwindcss.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" as="style" />
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Шрифты с font-display: swap для мгновенного отображения текста -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- React & ReactDOM (production версии для скорости) -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  
  <!-- Import map for Firebase modules -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "firebase/messaging": "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js"
      }
    }
  </script>
  
  <!-- Наш модуль инициализации Firebase -->
  <script type="module" src="/apb-admin/firebase-init.js"></script>
  <!-- Компонент настроек (без JSX) -->
  <script type="module" src="/apb-admin/settings.js"></script>
  
  <style>
    * { font-family: 'Inter', sans-serif; box-sizing: border-box; }    body { margin: 0; padding: 0; background: #f9fafb; -webkit-tap-highlight-color: transparent; }
    
    /* Скрытие скроллбара */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* Анимации */
    @keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
    .event-text { animation: fadeIn 0.3s ease-out; }
    
    /* Оптимизированный прелоадер */
    .preloader {
      position: fixed; inset: 0; background: #fff; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.2s ease;
    }
    .preloader.hidden { opacity: 0; pointer-events: none; }
    .preloader-text {
      font-weight: 200; font-size: 0.85rem; letter-spacing: 0.15em;
      color: #000; margin-bottom: 24px; text-transform: lowercase;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .preloader-progress {
      width: 200px; height: 1px; background: #f2f2f2; margin-bottom: 12px; position: relative;
    }
    .preloader-bar {
      height: 100%; width: 0%; background: #000;
      transition: width 0.2s ease-out; will-change: width;
    }
    .preloader-percent {
      font-weight: 100; font-size: 0.75rem; color: #666; letter-spacing: 0.1em;
    }
    
    /* Плавное появление интерфейса */
    .ui-ready { animation: fadeInUI 0.3s ease-out forwards; }
    @keyframes fadeInUI { from { opacity: 0; } to { opacity: 1; } }
    
    /* Оптимизация: отключаем лишние переходы на мобильных */
    @media (max-width: 640px) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <!-- Оптимизированный прелоадер -->
  <div id="preloader" class="preloader">
    <div class="preloader-text">загрузка...</div>
    <div class="preloader-progress"><div id="preloaderBar" class="preloader-bar"></div></div>
    <div id="preloaderPercent" class="preloader-percent">0%</div>  </div>

  <div id="root"></div>

  <!-- Основной скрипт приложения (без Babel - чистый React.createElement) -->
  <script type="module">
    import { db, messaging } from '/apb-admin/firebase-init.js';
    import { collection, onSnapshot, query, orderBy, limit } from 'firebase/firestore';
    import { onMessage } from 'firebase/messaging';
    import { Settings } from '/apb-admin/settings.js';

    const MONTHS = ["Январь","Февраль","Март","Апрель","Май","Июнь","Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];

    // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
    const createElement = React.createElement;

    // ========== КОМПОНЕНТ APP ==========
    function App() {
      // Состояния
      const [data, setData] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [selectedCity, setSelectedCity] = React.useState('Все города');
      const [selectedDate, setSelectedDate] = React.useState({ month: new Date().getMonth(), year: new Date().getFullYear() });
      const [selectedDay, setSelectedDay] = React.useState(null);
      const [currentEvent, setCurrentEvent] = React.useState(null);
      const [lastEventText, setLastEventText] = React.useState('');
      const [modalMedia, setModalMedia] = React.useState(null);
      const [aiAnalysis, setAiAnalysis] = React.useState("");
      const [isAnalyzing, setIsAnalyzing] = React.useState(false);
      const [errorInfo, setErrorInfo] = React.useState(null);
      const [fullscreenImage, setFullscreenImage] = React.useState(null);
      const [deferredPrompt, setDeferredPrompt] = React.useState(null);
      const [showCalendar, setShowCalendar] = React.useState(false);
      const [showUpdateNotification, setShowUpdateNotification] = React.useState(false);
      const [adminDeviceId, setAdminDeviceId] = React.useState('');
      const [showPushSettings, setShowPushSettings] = React.useState(false);
      const [progress, setProgress] = React.useState(0);

      // Рефы
      const scrollRef = React.useRef(null);
      const calendarRef = React.useRef(null);
      const eventTimeoutRef = React.useRef(null);
      const tempEventTimeoutRef = React.useRef(null);

      // Очистка таймеров при размонтировании
      React.useEffect(() => {
        return () => {
          if (eventTimeoutRef.current) clearTimeout(eventTimeoutRef.current);
          if (tempEventTimeoutRef.current) clearTimeout(tempEventTimeoutRef.current);
        };      }, []);

      // Прогресс загрузки (оптимизировано)
      React.useEffect(() => {
        if (!loading) return;
        let frameId;
        const animate = () => {
          setProgress(prev => {
            if (prev >= 100) return 100;
            return Math.min(100, prev + Math.random() * 5);
          });
          if (progress < 100) frameId = requestAnimationFrame(animate);
        };
        frameId = requestAnimationFrame(animate);
        return () => cancelAnimationFrame(frameId);
      }, [loading]);

      // Показ события
      const showEvent = React.useCallback((text, isTemporary = false) => {
        if (isTemporary) {
          if (!lastEventText) return;
          if (tempEventTimeoutRef.current) clearTimeout(tempEventTimeoutRef.current);
          setCurrentEvent({ id: Date.now(), text: lastEventText, isTemporary: true });
          tempEventTimeoutRef.current = setTimeout(() => {
            setCurrentEvent(prev => prev?.isTemporary ? null : prev);
            tempEventTimeoutRef.current = null;
          }, 1000);
        } else {
          if (eventTimeoutRef.current) clearTimeout(eventTimeoutRef.current);
          setCurrentEvent({ id: Date.now(), text, isTemporary: false });
          setLastEventText(text);
          eventTimeoutRef.current = setTimeout(() => {
            setCurrentEvent(prev => prev && !prev.isTemporary ? null : prev);
            eventTimeoutRef.current = null;
          }, 30000);
        }
      }, [lastEventText]);

      // Обработчик клика по дашборду
      const handleDashboardClick = React.useCallback(() => {
        if (currentEvent && !currentEvent.isTemporary) {
          if (eventTimeoutRef.current) clearTimeout(eventTimeoutRef.current);
          setCurrentEvent(prev => ({ ...prev, id: Date.now() }));
          eventTimeoutRef.current = setTimeout(() => { setCurrentEvent(null); eventTimeoutRef.current = null; }, 30000);
        } else if (lastEventText) {
          showEvent(lastEventText, true);
        }
      }, [currentEvent, lastEventText, showEvent]);

      // beforeinstallprompt      React.useEffect(() => {
        const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); };
        window.addEventListener('beforeinstallprompt', handler);
        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      // Закрытие календаря при клике вне
      React.useEffect(() => {
        const handleClickOutside = (e) => {
          if (calendarRef.current && !calendarRef.current.contains(e.target)) setShowCalendar(false);
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      // Установка PWA
      const handleInstallClick = React.useCallback(async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') setDeferredPrompt(null);
      }, [deferredPrompt]);

      // Обновление PWA
      const handleUpdateClick = React.useCallback(() => {
        if (navigator.serviceWorker?.controller) {
          navigator.serviceWorker.controller.postMessage({ action: 'skipWaiting' });
          navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload(), { once: true });
        }
        setShowUpdateNotification(false);
      }, []);

      // Регистрация Service Worker
      React.useEffect(() => {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/apb-admin/a-sw.js').then((reg) => {
            setInterval(() => reg.update(), 3600000);
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker?.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  setShowUpdateNotification(true);
                }
              });
            });
          }).catch(err => console.log('SW error:', err));
        }
      }, []);

      // Генерация ID устройства      React.useEffect(() => {
        let deviceId = localStorage.getItem('admin_device_id');
        if (!deviceId) {
          deviceId = 'admin_' + Math.random().toString(36).substr(2, 12) + Date.now();
          localStorage.setItem('admin_device_id', deviceId);
        }
        setAdminDeviceId(deviceId);
      }, []);

      // Push-уведомления в foreground
      React.useEffect(() => {
        const unsubscribe = onMessage(messaging, (payload) => {
          let text = payload.notification?.body || payload.data?.body || '';
          if (payload.data?.judgeName && payload.data?.participantNumbers) {
            text = `${payload.data.judgeName} оценил участника №${payload.data.participantNumbers}`;
          }
          if (text) showEvent(text);
        });
        return () => unsubscribe();
      }, [showEvent]);

      // Подписка на Firebase (оптимизировано)
      React.useEffect(() => {
        let mounted = true;
        const q = query(collection(db, 'evaluations'), orderBy('createdAt', 'desc'), limit(100));
        
        const unsubscribe = onSnapshot(q, (snapshot) => {
          if (!mounted) return;
          const evaluations = snapshot.docs.map(doc => ({ firestoreId: doc.id, ...doc.data() }));
          
          // Показываем событие только для новых записей
          if (data.length > 0) {
            const newEvals = evaluations.filter(newItem => !data.some(old => old.firestoreId === newItem.firestoreId));
            newEvals.forEach(item => {
              const text = `${item.judgeName || 'Судья'} оценил участника №${item.participants?.map(p=>p.number).join(',')||'—'}`;
              showEvent(text);
            });
          }
          
          // Автовыбор последней даты
          if (evaluations.length > 0 && evaluations[0].createdAt) {
            const d = evaluations[0].createdAt.toDate();
            setSelectedDate({ month: d.getMonth(), year: d.getFullYear() });
            setSelectedDay(d.getDate());
          }
          
          setData(evaluations);
          requestAnimationFrame(() => { if (mounted) setLoading(false); });
        }, (err) => { console.error('Firebase error:', err); if (mounted) setLoading(false); });
        return () => { mounted = false; unsubscribe(); };
      }, []); // Пустой массив зависимостей - выполняется один раз

      // Прокрутка вниз
      React.useEffect(() => {
        if (scrollRef.current && !loading) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [data, selectedCity, selectedDate, selectedDay, loading]);

      // Обновление иконок
      React.useEffect(() => {
        const t = setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 50);
        return () => clearTimeout(t);
      });

      // ========== ОПТИМИЗИРОВАННЫЕ ВЫЧИСЛЕНИЯ (useMemo) ==========
      
      const filteredByDate = React.useMemo(() => {
        return data.filter(item => {
          if (!item.createdAt) return false;
          const d = item.createdAt.toDate();
          return d.getMonth() === selectedDate.month && d.getFullYear() === selectedDate.year && (selectedDay === null || d.getDate() === selectedDay);
        });
      }, [data, selectedDate, selectedDay]);

      const flatList = React.useMemo(() => {
        const list = [];
        filteredByDate.forEach(item => {
          if (item.participants?.length) {
            item.participants.forEach((p, idx) => {
              list.push({
                firestoreId: item.firestoreId, participantIdx: idx,
                number: p.number || '00', score: Number(p.score) || 0,
                judge: item.judgeName || '—', city: item.city || '—',
                comment: p.comment || '', photos: p.photos || [],
                discipline: item.discipline || '—', createdAt: item.createdAt
              });
            });
          }
        });
        return list.sort((a,b) => (a.createdAt?.toDate()?.getTime()||0) - (b.createdAt?.toDate()?.getTime()||0));
      }, [filteredByDate]);

      const aggregated = React.useMemo(() => {
        const groups = {};
        filteredByDate.forEach(item => {
          if (item.participants?.length) {
            item.participants.forEach(p => {
              const date = item.createdAt?.toDate() || new Date();              const key = `${p.number}|${item.discipline}|${item.city}|${date.toDateString()}`;
              if (!groups[key]) {
                groups[key] = { number: p.number, discipline: item.discipline, city: item.city, date, scores: [], comments: [], photos: [], judges: [] };
              }
              groups[key].scores.push(Number(p.score)||0);
              if (p.comment) groups[key].comments.push({ judge: item.judgeName, text: p.comment });
              if (p.photos) groups[key].photos.push(...p.photos);
              if (item.judgeName) groups[key].judges.push(item.judgeName);
            });
          }
        });
        return Object.values(groups).map(g => ({
          ...g, avgScore: g.scores.reduce((a,b)=>a+b,0)/g.scores.length,
          allComments: g.comments, allPhotos: [...new Set(g.photos)]
        })).sort((a,b) => b.avgScore - a.avgScore);
      }, [filteredByDate]);

      const cities = React.useMemo(() => ['Все города', ...new Set(flatList.map(e => e.city))], [flatList]);
      const filteredLive = React.useMemo(() => selectedCity === 'Все города' ? flatList : flatList.filter(e => e.city === selectedCity), [flatList, selectedCity]);
      
      const nominationGroups = React.useMemo(() => {
        const filtered = selectedCity === 'Все города' ? aggregated : aggregated.filter(g => g.city === selectedCity);
        const groups = {};
        filtered.forEach(g => { if (!groups[g.discipline]) groups[g.discipline] = []; groups[g.discipline].push(g); });
        Object.keys(groups).forEach(k => groups[k].sort((a,b)=>b.avgScore-a.avgScore));
        return groups;
      }, [aggregated, selectedCity]);

      const daysWithData = React.useMemo(() => {
        const days = new Set();
        data.forEach(item => {
          if (!item.createdAt) return;
          const d = item.createdAt.toDate();
          if (d.getMonth() === selectedDate.month && d.getFullYear() === selectedDate.year) days.add(d.getDate());
        });
        return Array.from(days).sort((a,b)=>a-b);
      }, [data, selectedDate]);

      // ========== ДРУГИЕ ФУНКЦИИ ==========
      
      const analyzeComments = React.useCallback(async (target, mode) => {
        setIsAnalyzing(true); setAiAnalysis(""); setErrorInfo(null);
        let text = '';
        if (mode === 'single') {
          const rec = flatList.find(e => e.firestoreId === target.firestoreId && e.participantIdx === target.participantIdx);
          if (rec?.comment) text = `Судья ${rec.judge}: "${rec.comment}"`;
        } else {
          const dateStr = new Date(target.date).toDateString();
          text = flatList.filter(e => e.number===target.number && e.discipline===target.discipline && e.city===target.city && new Date(e.createdAt.toDate()).toDateString()===dateStr && e.comment)
            .map(e => `Судья ${e.judge}: "${e.comment}"`).join("\n");        }
        if (!text) { setAiAnalysis("Нет отзывов для анализа"); setIsAnalyzing(false); return; }
        try {
          const res = await fetch("https://functions.yandexcloud.net/d4ej8k6scmj9evo4us4n", {
            method: "POST", headers: {"Content-Type":"application/json"},
            body: JSON.stringify({ completionOptions:{stream:false,temperature:0.6,maxTokens:"2000"}, messages:[
              {role:"system",text:"Ты эксперт-аналитик конкурса по брейдингу. Пиши кратко и профессионально."},
              {role:"user",text:`Проанализируй отзывы:\n${text}`}
            ]})
          });
          if (!res.ok) throw new Error('HTTP '+res.status);
          const result = await res.json();
          setAiAnalysis(result.result?.alternatives?.[0]?.message?.text || "Анализ не удался");
        } catch { setErrorInfo("Ошибка запроса"); }
        finally { setIsAnalyzing(false); }
      }, [flatList]);

      const openFromStream = React.useCallback((item) => {
        setModalMedia({ type:'single', firestoreId:item.firestoreId, participantIdx:item.participantIdx, number:item.number, discipline:item.discipline, city:item.city, timestamp:item.createdAt.toDate().toISOString(), photos:item.photos, judge:item.judge, comment:item.comment });
        analyzeComments(item, 'single');
      }, [analyzeComments]);

      const openFromAggregated = React.useCallback((group) => {
        setModalMedia({ type:'group', number:group.number, discipline:group.discipline, city:group.city, timestamp:group.date, photos:group.allPhotos, comments:group.allComments });
        analyzeComments(group, 'group');
      }, [analyzeComments]);

      const copyReport = React.useCallback(() => {
        if (!modalMedia) return;
        const comments = modalMedia.type==='single' ? `• ${modalMedia.judge}: "${modalMedia.comment}"` : modalMedia.comments.map(c=>`• ${c.judge}: "${c.text}"`).join("\n");
        const report = `Участник №${modalMedia.number}\nНоминация: ${modalMedia.discipline}\nГород: ${modalMedia.city}\nДата: ${new Date(modalMedia.timestamp).toLocaleDateString()}\n\nAI Анализ:\n${aiAnalysis||"Нет"}\n\nКомментарии:\n${comments||"Нет"}`;
        navigator.clipboard.writeText(report).then(()=>alert("Скопировано")).catch(()=>alert("Ошибка"));
      }, [modalMedia, aiAnalysis]);

      const changeMonth = React.useCallback((dir) => {
        setSelectedDate(prev => {
          let m = prev.month + dir, y = prev.year;
          if (m>11) { m=0; y++; } if (m<0) { m=11; y--; }
          return { month: m, year: y };
        });
        setSelectedDay(null);
      }, []);

      const dateDisplay = selectedDay ? `${selectedDay} ${MONTHS[selectedDate.month]} ${selectedDate.year}` : `${MONTHS[selectedDate.month]} ${selectedDate.year}`;

      // ========== ПРЕЛОАДЕР ==========
      if (loading) {
        return createElement('div', { className: 'min-h-screen bg-white flex items-center justify-center' },
          createElement('div', { className: 'text-center max-w-xs' },
            createElement('div', { className: 'text-gray-900 font-light text-sm tracking-widest mb-6 animate-pulse' }, 'загрузка данных...'),            createElement('div', { className: 'w-full h-px bg-gray-200 mb-3' },
              createElement('div', { id: 'preloaderBar', className: 'h-full bg-black transition-all duration-200', style: { width: progress+'%' } })
            ),
            createElement('div', { className: 'text-gray-500 text-xs font-light tracking-wider' }, Math.floor(progress)+'%')
          )
        );
      }

      // ========== ОСНОВНОЙ РЕНДЕР ==========
      return createElement('div', { className: 'min-h-screen bg-gray-50 text-gray-900 select-none pb-12 ui-ready' },
        
        // Баннер установки
        deferredPrompt && createElement('div', { className: 'bg-black text-white px-4 py-2 flex justify-between items-center text-[10px] sticky top-0 z-50' },
          createElement('span', null, 'УСТАНОВИТЕ ПРИЛОЖЕНИЕ'),
          createElement('button', { onClick: handleInstallClick, className: 'bg-white text-black px-3 py-1 rounded-full text-[9px]' }, 'ДОБАВИТЬ')
        ),

        // Обновление
        showUpdateNotification && createElement('div', { className: 'bg-black text-white px-4 py-2 flex justify-between items-center text-[10px] sticky top-0 z-50', style: { top: deferredPrompt?'36px':'0' } },
          createElement('span', null, 'НОВАЯ ВЕРСИЯ'),
          createElement('button', { onClick: handleUpdateClick, className: 'bg-white text-black px-3 py-1 rounded-full text-[9px]' }, 'ОБНОВИТЬ')
        ),

        // Шапка с дашбордом
        createElement('div', { className: 'sticky top-2 z-40 w-full pt-2 pb-4 px-3' },
          createElement('div', { className: 'max-w-5xl mx-auto flex items-center justify-between' },
            createElement('div', { className: 'w-8' }),
            createElement('div', { onClick: handleDashboardClick, className: 'bg-black text-white rounded-full flex items-center overflow-hidden transition-all duration-200 cursor-pointer', style: { maxWidth: currentEvent?'500px':'40px' } },
              createElement('div', { className: 'p-2 flex-shrink-0' }, createElement('i', { 'data-lucide':'bell', width:'16', height:'16', className:'text-gray-400' })),
              currentEvent && createElement('div', { className: 'whitespace-nowrap overflow-hidden text-ellipsis mr-3 text-[11px] font-medium event-text' }, currentEvent.text)
            ),
            createElement('button', { onClick: ()=>setShowPushSettings(true), className: 'w-8 h-8 bg-black text-white rounded-full flex items-center justify-center' },
              createElement('i', { 'data-lucide':'settings', width:'16', height:'16' })
            )
          )
        ),

        // Настройки
        createElement(Settings, { show: showPushSettings, onClose: ()=>setShowPushSettings(false), adminDeviceId }),

        // Основной контент
        createElement('div', { className: 'max-w-5xl mx-auto px-4 space-y-5 mt-2' },
          
          // Календарь
          createElement('div', { className: 'relative', ref: calendarRef },
            createElement('button', { onClick: ()=>setShowCalendar(!showCalendar), className: 'w-full bg-white rounded-2xl p-3 border border-gray-200 flex items-center justify-between' },
              createElement('div', { className: 'flex items-center gap-2 text-gray-400' },
