<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="АПБ Админ Панель – управление чемпионатом" />
  <link rel="manifest" href="/apb-admin/a-manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/apb-admin/aapple-touch-icon.png" />
  <title>АПБ Админ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Import map for Firebase modules -->
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js",
        "firebase/messaging": "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js"
      }
    }
  </script>
  <!-- Наш модуль инициализации Firebase -->
  <script type="module" src="/apb-admin/firebase-init.js"></script>
  <style>
    * {
      font-family: 'Inter', sans-serif;
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-5px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .event-text {
      animation: fadeIn 0.3s ease-out;
    }
    /* Стили для прелоадера */
    .preloader-container {
      text-align: center;
      width: 100%;
      max-width: 280px;
    }
    .preloader-text {
      font-weight: 200;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: #000;
      margin-bottom: 24px;
      text-transform: lowercase;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .preloader-progress-container {
      width: 100%;
      height: 1px;
      background-color: #f2f2f2;
      margin-bottom: 12px;
      position: relative;
    }
    .preloader-progress-bar {
      height: 100%;
      width: 0%;
      background-color: #000;
      transition: width 0.3s ease-out;
    }
    .preloader-percentage {
      font-weight: 100;
      font-size: 0.75rem;
      color: #666;
      letter-spacing: 0.1em;
      margin-top: 8px;
    }
    .fade-in-ui {
      animation: fadeInUI 1s ease-out forwards;
    }
    @keyframes fadeInUI {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* Стили для toggle */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #e5e7eb;
      transition: .2s;
      border-radius: 24px;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .2s;
      border-radius: 50%;
    }
    input:checked + .toggle-slider {
      background-color: #000;
    }
    input:checked + .toggle-slider:before {
      transform: translateX(20px);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import { db, messaging, saveFcmToken, removeFcmToken } from '/apb-admin/firebase-init.js';
    import { collection, onSnapshot, query, orderBy, limit } from 'firebase/firestore';
    import { getToken, onMessage } from 'firebase/messaging';

    const MONTHS = [
      "Январь", "Февраль", "Март", "Апрель", "Май", "Июнь",
      "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"
    ];

    function App() {
      const [data, setData] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [selectedCity, setSelectedCity] = React.useState('Все города');
      const [selectedDate, setSelectedDate] = React.useState({
        month: new Date().getMonth(),
        year: new Date().getFullYear()
      });
      const [selectedDay, setSelectedDay] = React.useState(null);
      const [currentEvent, setCurrentEvent] = React.useState(null);
      const [lastEventText, setLastEventText] = React.useState('');
      const [modalMedia, setModalMedia] = React.useState(null);
      const [aiAnalysis, setAiAnalysis] = React.useState("");
      const [isAnalyzing, setIsAnalyzing] = React.useState(false);
      const [errorInfo, setErrorInfo] = React.useState(null);
      const [fullscreenImage, setFullscreenImage] = React.useState(null);
      const [deferredPrompt, setDeferredPrompt] = React.useState(null);
      const [showCalendar, setShowCalendar] = React.useState(false);
      const [showUpdateNotification, setShowUpdateNotification] = React.useState(false);
      const [adminDeviceId, setAdminDeviceId] = React.useState('');
      
      // Состояние для окна настроек push
      const [showPushSettings, setShowPushSettings] = React.useState(false);
      // Состояние включения push-уведомлений (из localStorage)
      const [pushEnabled, setPushEnabled] = React.useState(() => {
        const saved = localStorage.getItem('pushEnabled');
        return saved === null ? true : saved === 'true';
      });

      // Состояние для прогресса загрузки
      const [progress, setProgress] = React.useState(0);

      const scrollRef = React.useRef(null);
      const calendarRef = React.useRef(null);
      const eventTimeoutRef = React.useRef(null);
      const tempEventTimeoutRef = React.useRef(null);

      // --- ОЧИСТКА ТАЙМЕРОВ ---
      React.useEffect(() => {
        return () => {
          if (eventTimeoutRef.current) clearTimeout(eventTimeoutRef.current);
          if (tempEventTimeoutRef.current) clearTimeout(tempEventTimeoutRef.current);
        };
      }, []);

      // --- ИМИТАЦИЯ ПРОГРЕССА ---
      React.useEffect(() => {
        if (!loading) return;
        let interval = setInterval(() => {
          setProgress(prev => {
            const increment = Math.random() * 3;
            const next = prev + increment;
            if (next >= 100) {
              clearInterval(interval);
              return 100;
            }
            return next;
          });
        }, 50);
        return () => clearInterval(interval);
      }, [loading]);

      // --- ПОКАЗ СОБЫТИЯ (showEvent) ---
      const showEvent = (text, isTemporary = false) => {
        if (isTemporary) {
          if (!lastEventText) return;
          if (tempEventTimeoutRef.current) clearTimeout(tempEventTimeoutRef.current);
          setCurrentEvent({ id: Date.now(), text: lastEventText, isTemporary: true });
          tempEventTimeoutRef.current = setTimeout(() => {
            setCurrentEvent(prev => prev?.isTemporary ? null : prev);
            tempEventTimeoutRef.current = null;
          }, 1000);
        } else {
          if (eventTimeoutRef.current) clearTimeout(eventTimeoutRef.current);
          setCurrentEvent({ id: Date.now(), text, isTemporary: false });
          setLastEventText(text);
          eventTimeoutRef.current = setTimeout(() => {
            setCurrentEvent(prev => prev && !prev.isTemporary ? null : prev);
            eventTimeoutRef.current = null;
          }, 30000);
        }
      };

      // --- ОБРАБОТЧИК КЛИКА ПО ДАШБОРДУ ---
      const handleDashboardClick = () => {
        if (currentEvent && !currentEvent.isTemporary) {
          if (eventTimeoutRef.current) clearTimeout(eventTimeoutRef.current);
          setCurrentEvent(prev => ({ ...prev, id: Date.now() }));
          eventTimeoutRef.current = setTimeout(() => {
            setCurrentEvent(null);
            eventTimeoutRef.current = null;
          }, 30000);
        } else {
          if (lastEventText) {
            showEvent(lastEventText, true);
          }
        }
      };

      // --- beforeinstallprompt ---
      React.useEffect(() => {
        window.addEventListener('beforeinstallprompt', (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
        });
      }, []);

      // --- ЗАКРЫТИЕ КАЛЕНДАРЯ ПРИ КЛИКЕ ВНЕ ---
      React.useEffect(() => {
        const handleClickOutside = (event) => {
          if (calendarRef.current && !calendarRef.current.contains(event.target)) {
            setShowCalendar(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleInstallClick = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') setDeferredPrompt(null);
      };

      const handleUpdateClick = () => {
        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({ action: 'skipWaiting' });
        }
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          window.location.reload();
        });
        setShowUpdateNotification(false);
      };

      // --- РЕГИСТРАЦИЯ SERVICE WORKER ---
      React.useEffect(() => {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/apb-admin/a-sw.js')
            .then((registration) => {
              console.log('SW registered:', registration);
              setInterval(() => {
                registration.update();
              }, 60 * 60 * 1000);
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                console.log('New service worker found');
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    setShowUpdateNotification(true);
                  }
                });
              });
            })
            .catch(err => console.log('SW registration failed:', err));
        }
      }, []);

      // --- ГЕНЕРАЦИЯ ID УСТРОЙСТВА ---
      React.useEffect(() => {
        let deviceId = localStorage.getItem('admin_device_id');
        if (!deviceId) {
          deviceId = 'admin_' + Math.random().toString(36).substr(2, 12) + Date.now();
          localStorage.setItem('admin_device_id', deviceId);
        }
        setAdminDeviceId(deviceId);
      }, []);

      // --- УПРАВЛЕНИЕ PUSH-УВЕДОМЛЕНИЯМИ (включение/отключение) ---
      React.useEffect(() => {
        if (!adminDeviceId) return;

        const handlePushToggle = async () => {
          if (pushEnabled) {
            // Включить уведомления
            try {
              const registration = await navigator.serviceWorker.ready;
              if (Notification.permission !== 'granted') {
                await Notification.requestPermission();
              }
              if (Notification.permission === 'granted') {
                const vapidKey = 'BHZoy1QJ4PkloCIRFeKQ2UwYr44eziDY8C8wXqL4bSG6mbRGxQ03-v6vGJCmITc3jPWKfcq3Au3gVT860yIwNLg';
                const token = await getToken(messaging, {
                  vapidKey,
                  serviceWorkerRegistration: registration
                });
                if (token) {
                  await saveFcmToken(adminDeviceId, token, navigator.userAgent);
                  console.log('Admin FCM token saved');
                }
              }
            } catch (err) {
              console.error('FCM setup error:', err);
            }
          } else {
            // Выключить уведомления – удалить токен из Firestore
            try {
              await removeFcmToken(adminDeviceId);
              console.log('Admin FCM token removed');
            } catch (err) {
              console.error('Error removing token:', err);
            }
          }
        };

        handlePushToggle();
      }, [adminDeviceId, pushEnabled]);

      // --- ОБРАБОТКА ВХОДЯЩИХ PUSH-СООБЩЕНИЙ (foreground) ---
      React.useEffect(() => {
        const unsubscribe = onMessage(messaging, (payload) => {
          console.log('Message received in foreground:', payload);
          let text = '';
          if (payload.notification) {
            text = payload.notification.body;
          } else if (payload.data) {
            const { judgeName, participantNumbers, discipline } = payload.data;
            if (judgeName && participantNumbers) {
              text = `${judgeName} оценил участника №${participantNumbers} в номинации ${discipline}`;
            }
          }
          if (text) {
            showEvent(text);
          }
        });
        return () => unsubscribe();
      }, []);

      // --- ПОДПИСКА НА КОЛЛЕКЦИЮ EVALUATIONS (исправленная) ---
      React.useEffect(() => {
        let mounted = true;

        const evaluationsQuery = query(
          collection(db, 'evaluations'),
          orderBy('createdAt', 'desc'),
          limit(100)
        );

        const unsubscribe = onSnapshot(evaluationsQuery, (snapshot) => {
          if (!mounted) return;

          const evaluations = snapshot.docs.map(doc => ({
            firestoreId: doc.id,
            ...doc.data()
          }));
          console.log('🔥 Получены оценки:', evaluations.length);

          if (data.length === 0 && evaluations.length > 0) {
            const latest = evaluations[0];
            const judge = latest.judgeName || 'Судья';
            const participantNumbers = latest.participants?.map(p => p.number).join(', ') || '—';
            const text = `${judge} оценил участника №${participantNumbers} в номинации ${latest.discipline || '—'}`;
            showEvent(text);
          } else if (data.length > 0) {
            const newEvals = evaluations.filter(newItem =>
              !data.some(oldItem => oldItem.firestoreId === newItem.firestoreId)
            );
            newEvals.forEach(item => {
              const judge = item.judgeName || 'Судья';
              const participantNumbers = item.participants?.map(p => p.number).join(', ') || '—';
              const text = `${judge} оценил участника №${participantNumbers} в номинации ${item.discipline || '—'}`;
              showEvent(text);
            });
          }

          if (evaluations.length > 0) {
            const latest = evaluations[0];
            if (latest.createdAt) {
              const lastDate = latest.createdAt.toDate();
              setSelectedDate({ month: lastDate.getMonth(), year: lastDate.getFullYear() });
              setSelectedDay(lastDate.getDate());
            }
          }

          setData(evaluations);

          requestAnimationFrame(() => {
            if (mounted) {
              setLoading(false);
            }
          });
        }, (error) => {
          console.error("❌ Snapshot error:", error);
          if (mounted) {
            setLoading(false);
          }
        });

        return () => {
          mounted = false;
          unsubscribe();
        };
      }, []);

      // --- ПРОКРУТКА ВНИЗ ПРИ ОБНОВЛЕНИИ ДАННЫХ ---
      React.useEffect(() => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
        }
      }, [data, selectedCity, selectedDate, selectedDay]);

      // --- ОБНОВЛЕНИЕ ИКОНОК LUCIDE ---
      React.useEffect(() => {
        if (window.lucide) {
          lucide.createIcons();
        }
      });

      // ========== ВСЕ ВАШИ ФУНКЦИИ (фильтрация, агрегация, анализ) ==========

      // Фильтрация по дате
      const getFilteredByDate = () => {
        return data.filter(item => {
          if (!item.createdAt) return false;
          const date = item.createdAt.toDate();
          if (date.getMonth() !== selectedDate.month || date.getFullYear() !== selectedDate.year) return false;
          if (selectedDay !== null && date.getDate() !== selectedDay) return false;
          return true;
        });
      };

      // Плоский список для потока (новые снизу)
      const getFlatList = () => {
        const list = [];
        const filteredData = getFilteredByDate();
        
        filteredData.forEach(item => {
          if (item.participants && Array.isArray(item.participants)) {
            item.participants.forEach((p, pIdx) => {
              list.push({
                firestoreId: item.firestoreId,
                participantIdx: pIdx,
                number: p.number || '00',
                score: Number(p.score) || 0,
                judge: item.judgeName || '—',
                city: item.city || '—',
                comment: p.comment || '',
                photos: p.photos || [],
                discipline: item.discipline || '—',
                createdAt: item.createdAt
              });
            });
          }
        });
        // Сортируем по времени создания (от старых к новым)
        list.sort((a, b) => {
          const timeA = a.createdAt ? a.createdAt.toDate().getTime() : 0;
          const timeB = b.createdAt ? b.createdAt.toDate().getTime() : 0;
          return timeA - timeB;
        });
        return list;
      };

      // Агрегированные данные для итогов
      const getAggregatedRanked = () => {
        const filteredData = getFilteredByDate();
        const groups = {};

        filteredData.forEach(item => {
          if (item.participants && Array.isArray(item.participants)) {
            item.participants.forEach(p => {
              const date = item.createdAt ? item.createdAt.toDate() : new Date();
              const key = `${p.number}|${item.discipline}|${item.city}|${date.toDateString()}`;
              if (!groups[key]) {
                groups[key] = {
                  number: p.number,
                  discipline: item.discipline,
                  city: item.city,
                  date: date,
                  scores: [],
                  comments: [],
                  photos: [],
                  judges: [],
                  firestoreIds: []
                };
              }
              groups[key].scores.push(Number(p.score) || 0);
              if (p.comment) groups[key].comments.push({ judge: item.judgeName, text: p.comment });
              if (p.photos) groups[key].photos.push(...p.photos);
              if (item.judgeName) groups[key].judges.push(item.judgeName);
              groups[key].firestoreIds.push(item.firestoreId);
            });
          }
        });

        const aggregated = Object.values(groups).map(g => ({
          ...g,
          avgScore: g.scores.reduce((a, b) => a + b, 0) / g.scores.length,
          allComments: g.comments,
          allPhotos: [...new Set(g.photos)]
        }));

        return aggregated.sort((a, b) => b.avgScore - a.avgScore);
      };

      // --- Переменные для отображения ---
      const allEntriesRaw = getFlatList(); // новые внизу
      const aggregatedRanked = getAggregatedRanked();
      const cities = ['Все города', ...new Set(allEntriesRaw.map(e => e.city))];
      
      const filteredLiveEntries = selectedCity === 'Все города' 
        ? allEntriesRaw 
        : allEntriesRaw.filter(e => e.city === selectedCity);

      const getNominationGroups = () => {
        const filteredAggregated = selectedCity === 'Все города' 
          ? aggregatedRanked 
          : aggregatedRanked.filter(g => g.city === selectedCity);
        const groups = {};
        filteredAggregated.forEach(g => {
          if (!groups[g.discipline]) groups[g.discipline] = [];
          groups[g.discipline].push(g);
        });
        Object.keys(groups).forEach(key => {
          groups[key].sort((a, b) => b.avgScore - a.avgScore);
        });
        return groups;
      };

      const getDaysWithData = () => {
        const days = new Set();
        data.forEach(item => {
          if (!item.createdAt) return;
          const date = item.createdAt.toDate();
          if (date.getMonth() === selectedDate.month && date.getFullYear() === selectedDate.year) {
            days.add(date.getDate());
          }
        });
        return Array.from(days).sort((a, b) => a - b);
      };

      // --- Анализ комментариев через YandexGPT ---
      const analyzeComments = async (target, mode) => {
        setIsAnalyzing(true);
        setAiAnalysis("");
        setErrorInfo(null);

        let commentsText = '';
        if (mode === 'single') {
          const { firestoreId, participantIdx } = target;
          const record = allEntriesRaw.find(e => e.firestoreId === firestoreId && e.participantIdx === participantIdx);
          if (record && record.comment.trim()) {
            commentsText = `Судья ${record.judge}: "${record.comment}"`;
          }
        } else {
          const { number, discipline, city, date } = target;
          const targetDate = new Date(date).toDateString();
          const comments = allEntriesRaw
            .filter(e => 
              e.number === number && 
              e.discipline === discipline && 
              e.city === city &&
              new Date(e.createdAt.toDate()).toDateString() === targetDate &&
              e.comment.trim().length > 0
            )
            .map(e => `Судья ${e.judge}: "${e.comment}"`)
            .join("\n");
          commentsText = comments;
        }

        if (!commentsText) {
          setAiAnalysis("Недостаточно отзывов для анализа.");
          setIsAnalyzing(false);
          return;
        }

        try {
          const PROXY_URL = "https://functions.yandexcloud.net/d4ej8k6scmj9evo4us4n";
          const response = await fetch(PROXY_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              completionOptions: { stream: false, temperature: 0.6, maxTokens: "2000" },
              messages: [
                { role: "system", text: "Ты эксперт-аналитик конкурса по брейдингу (плетение кос, дреды, брейды, изготовление комплектов для вплета). Пиши профессионально и вежливо, давай краткие резюме (2-3 предложения)." },
                { role: "user", text: `Проанализируй отзывы судей:\n\n${commentsText}` }
              ]
            })
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP error ${response.status}: ${errorText}`);
          }

          const result = await response.json();
          const generatedText = result.result?.alternatives?.[0]?.message?.text || "Анализ не удался.";
          setAiAnalysis(generatedText);
        } catch (error) {
          console.error("YandexGPT proxy error:", error);
          setErrorInfo("Ошибка при запросе к YandexGPT.");
        } finally {
          setIsAnalyzing(false);
        }
      };

      const openFromStream = (item) => {
        setModalMedia({
          type: 'single',
          firestoreId: item.firestoreId,
          participantIdx: item.participantIdx,
          number: item.number,
          discipline: item.discipline,
          city: item.city,
          timestamp: item.createdAt.toDate().toISOString(),
          photos: item.photos,
          judge: item.judge,
          comment: item.comment
        });
        analyzeComments(item, 'single');
      };

      const openFromAggregated = (group) => {
        setModalMedia({
          type: 'group',
          number: group.number,
          discipline: group.discipline,
          city: group.city,
          timestamp: group.date,
          photos: group.allPhotos,
          comments: group.allComments
        });
        analyzeComments(group, 'group');
      };

      const copyReportToClipboard = () => {
        if (!modalMedia) return;
        let commentsList = '';
        if (modalMedia.type === 'single') {
          commentsList = `• ${modalMedia.judge}: "${modalMedia.comment}"`;
        } else {
          commentsList = modalMedia.comments.map(c => `• ${c.judge}: "${c.text}"`).join("\n");
        }

              </div>
              <div className="absolute bottom-0 left-0 right-0 p-10 pb-20 flex justify-center items-center bg-gradient-to-t from-black/60 to-transparent">
                <button onClick={takePhoto} className="w-20 h-20 bg-[#3171af] rounded-full border-[6px] border-white/20 flex items-center justify-center active:scale-90 transition-transform">
                  <div className="w-14 h-14 bg-white rounded-full border-2 border-black/5" />
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
